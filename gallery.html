<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Graphic Design Portfolio</title>
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">MyPortfolio</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Gallery Section -->
    <main>
        <section class="gallery-section">
            <h1>My Gallery</h1>
            <p class="gallery-description">A curated collection of my best design projects.</p>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="project1.jpg" alt="Project 1" class="gallery-image" onclick="openLightbox();showSlide(1)">
                </div>
                <div class="gallery-item">
                    <img src="project2.jpg" alt="Project 2" class="gallery-image" onclick="openLightbox();showSlide(2)">
                </div>
                <div class="gallery-item">
                    <img src="project3.jpg" alt="Project 3" class="gallery-image" onclick="openLightbox();showSlide(3)">
                </div>
                <div class="gallery-item">
                    <img src="project4.jpg" alt="Project 4" class="gallery-image" onclick="openLightbox();showSlide(4)">
                </div>
                <div class="gallery-item">
                    <img src="project5.jpg" alt="Project 5" class="gallery-image" onclick="openLightbox();showSlide(5)">
                </div>
                <div class="gallery-item">
                    <img src="project6.jpg" alt="Project 6" class="gallery-image" onclick="openLightbox();showSlide(6)">
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-image" src="" alt="Lightbox Image">
            <div class="lightbox-controls">
                <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
                <span class="next" onclick="changeSlide(1)">&#10095;</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 MyPortfolio. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
